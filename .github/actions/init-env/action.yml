# This action mostly follows steps described here https://github.com/marketplace/actions/install-poetry-action

name: Init
description: Set up python environment
inputs:
  os:
    type: string
    required: true
  python:
    type: string
    required: true

runs:
  using: "composite"
  steps:
    #----------------------------------------------
    #       set-up python
    #----------------------------------------------
    - name: Set up Python ${{ inputs.python }}
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python }}

    #----------------------------------------------
    #  -----  install & configure uv  -----
    #----------------------------------------------
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"
        enable-cache: true
    #   cache-suffix: "optional-suffix"
    #----------------------------------------------
    #  -----  install & configure poetry  -----
    #----------------------------------------------
    # - name: Install Poetry
    #   uses: snok/install-poetry@v1
    #   with:
    #     version: latest
    #     virtualenvs-create: true
    #     virtualenvs-in-project: true
    #     installer-parallel: true
    #     plugins: poetry-plugin-export
    #
    #----------------------------------------------
    #       load cached venv if cache exists
    #----------------------------------------------
    - name: Load cached venv
      id: cached-uv-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/uv.lock') }}

    #----------------------------------------------
    # install dependencies if cache does not exist
    #----------------------------------------------
    - name: Install dependencies
      if: steps.cached-uv-dependencies.outputs.cache-hit != 'true'
      run: uv sync --group cicd  # --no-interaction --no-root
      shell: bash

    #----------------------------------------------
    # install root project
    #----------------------------------------------
    - name: Install project
      run: uv pip install -e . --no-deps
      shell: bash
