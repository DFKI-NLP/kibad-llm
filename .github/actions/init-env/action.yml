# This action mostly follows steps described here https://github.com/marketplace/actions/install-poetry-action and then was adapted to uv

name: Init
description: Set up python environment
inputs:
  os:
    type: string
    required: true
  python:
    type: string
    required: true

runs:
  using: "composite"
  steps:
    #----------------------------------------------
    #       set-up python
    #----------------------------------------------
    - name: Set up Python ${{ inputs.python }}
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python }}

    #----------------------------------------------
    #  -----  install & configure uv  -----
    #----------------------------------------------
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"
        enable-cache: true
    #   cache-suffix: "optional-suffix"

    #----------------------------------------------
    #       load cached venv if cache exists
    #----------------------------------------------
    - name: Load cached venv
      id: cached-uv-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/uv.lock') }}

    #----------------------------------------------
    # sync the venv to ensure the cache is up to date
    #----------------------------------------------
    - name: Install dependencies
      run: uv sync --group cicd
      shell: bash
