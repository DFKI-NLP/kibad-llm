# This action mostly follows steps described here https://github.com/marketplace/actions/install-poetry-action and then was adapted to uv

name: Init
description: Set up python environment
inputs:
  os:
    type: string
    required: true
  python:
    type: string
    required: true

runs:
  using: "composite"
  steps:

    #----------------------------------------------
    #       free disk space
    #----------------------------------------------
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: false

        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    #----------------------------------------------
    #       set-up python
    #----------------------------------------------
    - name: Set up Python ${{ inputs.python }}
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python }}

    #----------------------------------------------
    #  -----  install & configure uv  -----
    #----------------------------------------------
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.9.26"
        enable-cache: true
        python-version: ${{ inputs.python }}

    #----------------------------------------------
    #       install dependencies
    #----------------------------------------------
    - name: Install dependencies
      run: uv sync --group cicd
      shell: bash
