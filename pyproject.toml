[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "kibad-llm"
version = "0.0.1"
description = "A short description of the project."
authors = [
  { name = "Your name (or your organization/company/team)" },
]

readme = "README.md"
classifiers = [
    "Programming Language :: Python :: 3",

]
dependencies = [
    "psycopg2_binary==2.9.10",  # for db_converter.py
    "types-psycopg2",
    "pyyaml",   # for db_converter.py
    "types-PyYAML",

    # utils & other
    "pyrootutils (>=1.0.4,<2.0.0)",     # standardizing the project root setup
    "tqdm",
    "types-tqdm",
    "typer",
    "python-dotenv",
    "loguru",
    "mkdocs",
    "pip",
]
requires-python = "~=3.10.0"

[tool.poetry]
packages = [{ include = "kibad_llm", from = "src" }]

[tool.poetry.group.dev]
optional = true

[tool.poetry.group.dev.dependencies]

# testing utilities (with coverage and run-time type checking)
pytest = ">=6.2.5"
pytest-xdist = "^3.8.0"
pytest-cov = "^6.2.1"
typeguard = ">=2.13.3"

# code quality and static type checking (via pre-commit)
pre-commit = ">=2.16.0"
pre-commit-hooks = ">=4.1.0"
black = ">=21.12b0"
flake8 = ">=7.1.1"
isort = ">=5.12.0"
pyupgrade = ">=2.29.1"
mypy = ">=0.930"
flake8-pyproject = "^1.2.3"  # to read config from pyproject.toml

[tool.pytest.ini_options]
typeguard-packages = "kibad_llm"
# Some useful toggles:
# typeguard-debug-instrumentation = true
# typeguard-forward-ref-policy = "ERROR"
# typeguard-collection-check-strategy = "ALL_ITEMS"

[tool.flake8]
ignore = ["E731", "E266", "E501", "C901", "W503"]
max-line-length = 99
exclude = [".git", "notebooks", "references", "models", "data"]

[tool.black]
line-length = 99
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
)/
'''

[tool.isort]
profile = "black"
known_first_party = ["kibad_llm"]
force_sort_within_sections = true
