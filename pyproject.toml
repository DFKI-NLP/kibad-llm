[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "kibad-llm"
version = "0.0.1"
description = "A short description of the project."
authors = [
  { name = "Your name (or your organization/company/team)" },
]

readme = "README.md"
classifiers = [
    "Programming Language :: Python :: 3",

]
dependencies = [
    "psycopg2_binary==2.9.10",  # for db_converter.py
    "types-psycopg2",
    "pyyaml",   # for db_converter.py
    "types-PyYAML",

    # utils & other
    "tqdm",
    "types-tqdm",
    "typer",
    "python-dotenv",
    "loguru",
    "mkdocs",
    "pip",
]
requires-python = ">=3.10.0"

[tool.poetry]
packages = [{ include = "kibad_llm", from = "src" }]

[tool.poetry.group.dev]
optional = true

[tool.poetry.group.dev.dependencies]
# testing utilities (with coverage and run-time type checking)
pytest = ">=6.2.5"
pytest-xdist = "^3.8.0"
pytest-cov = "^6.2.1"
typeguard = ">=2.13.3"
# code quality and static type checking (via pre-commit)
pre-commit = ">=2.16.0"
mypy = ">=1.3.0"

[tool.pytest.ini_options]
typeguard-packages = "kibad_llm"
addopts = "--cov=kibad_llm --cov-report=term-missing"

[tool.coverage.run]
branch = true
source = ["kibad_llm"]   # measure only your package (src layout is fine)

[tool.coverage.report]
show_missing = true

[tool.black]
line-length = 99
# limit Black’s directory walk to real Python files only (.py / .pyi);
# avoids touching other extensions and speeds discovery on large repos
include = '\.pyi?$'
# don’t even scan common “noise” dirs (.git, virtualenv) when walking the tree;
# keeps runs fast and prevents accidental formatting of vendored/ephemeral files.
# triple-quoted here on purpose: Black treats multiline patterns as “verbose”
# regex, making it easy to extend later.
exclude = '''
/(
    \.git
  | \.venv
)/
'''

[tool.isort]
profile = "black"
known_first_party = ["kibad_llm"]
force_sort_within_sections = true

[tool.flake8]
ignore = ["E203", "E266", "E402", "E501", "F401", "F841", "C901", "W503", "E731"]
max-line-length = 99
exclude = [".git", "notebooks", "models", "data", "logs"]

[tool.codespell]
skip = "logs/**,data/**,*.ipynb"
ignore-words-list = "hist"

# Bandit (read by pre-commit bandit with -c pyproject.toml)
[tool.bandit]
skips = ["B101", "B107", "B403"]
# optionally exclude tests to reduce noise:
# exclude_dirs = ["tests"]

# mdformat (via mdformat-pyproject); tweak if you want numbering/wrapping
[tool.mdformat]
wrap = "keep"          # {"keep","no",INTEGER}
number = false         # consecutive numbering for ordered lists
end_of_line = "lf"
validate = true

# (optional) nbQA-specific knobs if you need them later:
# [tool.nbqa.config]
# black = "pyproject.toml"
# isort = "pyproject.toml"
# flake8 = "pyproject.toml"

[tool.mypy]
python_version = "3.10"
files = ["src", "tests"]
