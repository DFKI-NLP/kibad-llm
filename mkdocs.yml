site_name: kibad llm
site_url: https://sitename.example
#
site_author: Your name (or your organization/company/team)
#
theme:
  name: material
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: green
      accent: deep purple

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange

nav:
- Welcome: index.md
- General project overview: root-readme.md
- LLM usage instructions: models-readme.md
- Faktencheck database instructions: podman-readme.md
# defer to gen-files + literate-nav
- KIBA-D code Reference: reference/kibad_llm/

plugins:
- search
- gen-files:
    scripts:
    - src/kibad_llm/utils/build_docs.py
- literate-nav:
    nav_file: SUMMARY.md
- section-index
- mkdocstrings

markdown_extensions:
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.highlight:
      default_lang: python
