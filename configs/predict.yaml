# @package _global_

# Configuration for running classification based data extraction on a set of PDF files. The extracted
# data is saved in JSONL format. See models and templates config subdirectories for available model
# settings and prompt templates.
# Uses:
# - pymupdf4llm for PDF text extraction,
# - LlamaIndex to interact with a local LLM model to classify and extract structured data, and
# - datasets for pipeline management and caching.
#
# Usage:
#   python -m kibad_llm.predict pdf_directory=path/to/pdf/files


defaults:
  - _self_
  - model: gpt_oss_20b
  - pdf_reader: pymupdf4llm
  - paths: default
  - template: v1_with_schema
  - hydra: default

print_config: True

# ignore_warnings: True

# name of the run, used in logging and as a subdir of log_dir
name: "default"

# path to the directory containing the PDF files to process
pdf_directory: ???
# path to the JSONL file where the predictions will be saved
output_file: ${paths.prediction_save_dir}/predictions.jsonl

# enable to process only a subset of the data, useful for debugging
fast_dev_run: False
# enable to disable caching of extraction results, useful for debugging
disable_extraction_caching: False
