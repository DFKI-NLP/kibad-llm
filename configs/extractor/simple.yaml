# simple extraction workflow based on a single LLM call using a prompt template

defaults:
  - llm: gpt_oss_20b
  - prompt_template: with_schema
  - request_parameters: default

_target_: kibad_llm.extractors.extract_from_text_lenient
# mark as partial since it is a function (and not a class to be instantiated)
_partial_: True

schema:
  # create the schema from the pydantic model of EcosystemStudyFeaturesSimple
  _target_: kibad_llm.schema.types.EcosystemStudyFeaturesSimple.model_json_schema
  by_alias: false

# return options
return_reasoning: False
return_messages: False
return_messages_formatted: False
