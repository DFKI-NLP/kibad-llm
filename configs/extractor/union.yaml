# extraction workflow that repeats the extraction for each item in the overrides list
# and aggregates the results per key unanimously (i.e., only if all extractions agree
# on the same value, otherwise an error is raised)

defaults:
  # example with two setups (setup_ad and setup_b) that use different dummy (..._simple) schemas:
  # - schema@overrides.setup_a.schema: faktencheck_simple
  # - schema@overrides.setup_b.schema: faktencheck_compounds_simple
  - aggregator: unanimous
  - llm: gpt_oss_20b
  - prompt_template: default
  - request_parameters: default

_target_: kibad_llm.extractors.UnionExtractor

# Overrides need to be a list (or dictionary) containing dictionaries that will get
# instantiated and then passed as kwargs to the respective base extractor. Thus,
# no hydra-like merging for individual kwargs is possible.
overrides: ???

# for these fields, return a list of results from each extraction
return_as_list:
  # - structured
  - errors
  # - response_content
  - reasoning_content
  # - messages
  # - messages_formatted

# general return options (see simple extractor for details)
return_reasoning: True
return_messages: False
return_messages_formatted: False
