# extraction workflow that repeats the extraction n times for each entry in overrides
# and aggregates the results per key by majority voting

defaults:
  - aggregator: majority_vote
  - prompt_template: default
  - request_parameters: default

_target_: kibad_llm.extractors.EnsembleExtractor

# options for the ensemble extractor

# overrides:
#   - llm: ...
#     some_other_parameter: ...
#   - llm: ...
#     some_other_parameter: ...

# for these fields, return a list of results from each repetition
return_as_list:
  # - structured
  - errors
  # - response_content
  - reasoning_content
  # - messages
  # - messages_formatted

# general return options (see simple extractor for details)
return_reasoning: True
return_messages: False
return_messages_formatted: False

# general extractor options

schema:
  # create the schema from the pydantic model of EcosystemStudyFeaturesSimple
  _target_: kibad_llm.schema.types.EcosystemStudyFeaturesSimple.model_json_schema
  by_alias: false
