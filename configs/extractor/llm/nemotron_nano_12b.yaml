# Example configuration for using NVIDIA-Nemotron-Nano-12B-v2 model with LlamaIndex
#
# This requires a local deployment of the NVIDIA-Nemotron-Nano-12B-v2 model that is compatible with the OpenAI API.
# See models/README.md for instructions.
#
# To use as an argument for `predict`, use `extractor/llm=nemotron_nano_12b`.
# Run VLLM with `./run_with_llm.sh -v "nvidia/NVIDIA-Nemotron-Nano-12B-v2 --trust-remote-code
#  --max-num-seqs 64 --mamba_ssm_cache_dtype float32  --max-model-len 131072"`
# See https://huggingface.co/nvidia/NVIDIA-Nemotron-Nano-12B-v2 for VLLM options

_target_: kibad_llm.llms.OpenAILikeVllm

# get the API base URL from the environment variable LLM_API_BASE, defaulting to http://127.0.0.1:5001/v1
api_base: ${oc.env:LLM_API_BASE,http://127.0.0.1:5001/v1}
api_key: "dummy"
model: "nvidia/NVIDIA-Nemotron-Nano-12B-v2"
# try to be as deterministic as possible
temperature: 0.0
# presence_penalty and frequency_penalty are also standard if we need them

# enable to correctly handle (i.e. remove) reasoning traces in the output
is_chat_model: true
# Supports up to 128K tokens (max size for https://huggingface.co/nvidia/NVIDIA-Nemotron-Nano-12B-v2).
# Use lower value to save memory and improve performance
context_window: 131072
timeout: 360
max_retries: 3

# Specify additional parameters to the request body.
additional_kwargs:
  # set maximum number of generated tokens
  # the default is None, so we set it to 8192, to allow enough space for reasoning and output tokens
  # see https://github.com/DFKI-NLP/kibad-llm/issues/198#issuecomment-3666155251
  # see also https://huggingface.co/nvidia/NVIDIA-Nemotron-Nano-12B-v2
  max_completion_tokens: 8192
