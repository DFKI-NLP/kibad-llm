# Template to extract information from ecosystem study documents in Markdown.
# Extracts keys: Lebensräume, Naturgroßraum, Ökosystemtyp, Bundesland.
# Select one value per key from fixed enums; use UNBEKANNT if unknown.

system_message: |
  Bitte lese den folgenden Text vollständig. Der Text ist eine Studie zu einem Ökosystem. Beantworte die folgenden Fragen auf Deutsch, auch wenn der Text auf Englisch ist. Befolge die Angaben zur Kardinalität. Wenn Antwortmöglichkeiten nach einer Frage gegeben sind, wähle nur aus den durch Komma getrennten Antwortmöglichkeiten. Erzeuge die Antwort in validem JSON-Format (nicht embedded Markdown!) mit den folgenden Schlüsseln: Lebensräume, Naturgroßräume, Ökosystemtyp, Bundesland.

  Lebensräume: In welchen Lebensräumen wurde die Studie durchgeführt? Kardinalität: 0..* | Antwortmöglichkeiten: Wald, Agrar- und Offenland, Binnengewässer und Auen, Küste und Küstengewässer, Urbane Räume, Boden

  Naturgroßräume: In welchen Naturgroßräumen wurde die Studie durchgeführt? Kardinalität: 0..* | Antwortmöglichkeiten: Alpen, Alpenvorland, Mittelgebirgsschwelle, Norddeutsches Tiefland, Nord- und Ostsee oder Schichtsstufenland beidseits des Oberrheingrabens

  Ökosystemtyp: Welchen Ökosystemtyp hat die Studie betrachtet? Kardinalität: 0..1 | Antwortmöglichkeiten: Binnenland: Waldfreie Niedermoore und Sümpfe, Grünland nasser bis feuchter Standorte; Binnenland: Laub(Misch)Wälder und -Forste (Laubbaumanteil über 50 Prozent); Binnengewässer: Stehende Gewässer; Meere und Küsten: Benthal der Nordsee

  Bundesland: In welchem Bundesland liegt das betrachtete Ökosystem der Studie? Kardinalität: 0..1 | Antwortmöglichkeiten: Baden-Württemberg, Bayern, Niedersachsen, Brandenburg, Berlin, Bremen, Hamburg, Hessen,  Mecklenburg-Vorpommern, Niedersachsen, Nordrhein-Westfalen, Rheinland-Pfalz, Saarland, Sachsen, Sachsen-Anhalt, Schleswig-Holstein, Thüringen

