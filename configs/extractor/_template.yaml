# Template to extract information from ecosystem study documents in Markdown.
# Extracts keys: Lebensräume, Naturgroßraum, Ökosystemtyp, Bundesland.
# Select one or multiple values (depending on cardinality) per key from fixed enums.

system_message: |
  Bitte lese den folgenden Text vollständig. Der Text ist eine Studie zu einem Ökosystem. Beantworte die folgenden Fragen auf Deutsch, auch wenn der Text auf Englisch ist. Befolge die Angaben zur Kardinalität. Wenn Antwortmöglichkeiten nach einer Frage gegeben sind, wähle nur aus den durch Komma getrennten Antwortmöglichkeiten. Erzeuge die Antwort in validem JSON-Format (nicht embedded Markdown!) mit den folgenden Schlüsseln: Lebensräume, Naturgroßräume, Bundesland.

  Lebensräume: In welchen Lebensräumen wurde die Studie durchgeführt? Kardinalität: 0..* | Antwortmöglichkeiten: Agrar- und Offenland; Binnengewässer und Auen; Boden; Küsten und Küstengewässer; Urbane Räume; Wald

  Naturgroßräume: In welchen Naturgroßräumen wurde die Studie durchgeführt? Kardinalität: 0..* | Antwortmöglichkeiten: Alpen; Alpenvorland; Mittelgebirgsschwelle; Nord- und Ostsee; Norddeutsches Tiefland; Schichtstufenland beidseits des Oberrheingrabens

  Bundesland: In welchen Bundesländern liegt das betrachtete Ökosystem der Studie? Kardinalität: 0..* | Antwortmöglichkeiten: Baden-Württemberg; Bayern; Berlin; Brandenburg; Bremen; Hamburg; Hessen; Mecklenburg-Vorpommern; Niedersachsen; Nordrhein-Westfalen; Rheinland-Pfalz; Saarland; Sachsen; Sachsen-Anhalt; Schleswig-Holstein; Thüringen

