# enable color logging
defaults:
  - override hydra_logging: colorlog
  - override job_logging: colorlog

callbacks:
  save_job_return:
    _target_: kibad_llm.hydra_callbacks.SaveJobReturnValueCallback
    integrate_multirun_result: true
    filenames:
      - job_return_value.json
      - job_return_value.md
    multirun_aggregator_blacklist: ["min", "25%", "50%", "75%", "max"]

# output directory, generated dynamically on each run
run:
  dir: ${paths.log_dir}/runs/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}
sweep:
  dir: ${paths.log_dir}/multiruns/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}
  subdir: ${hydra.job.num}
