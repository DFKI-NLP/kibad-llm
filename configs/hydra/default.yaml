# enable color logging
defaults:
  - override hydra_logging: colorlog
  - override job_logging: colorlog

callbacks:
  save_job_return:
    _target_: kibad_llm.hydra_callbacks.SaveJobReturnValueCallback
    integrate_multirun_result: false
    multirun_convert_job_ids: true
    sort_markdown_columns: true
    filenames:
      - job_return_value.json
      - job_return_value.md
    multirun_show_file_contents: [job_return_value.md]
    # file names contain the default separator ("-"), so we change it here to avoid conflicts
    multirun_overrides_separator: "#"
    multirun_replace_existing_overrides: true
    multirun_aggregator_blacklist: ["min", "25%", "50%", "75%", "max"]

# output directory, generated dynamically on each run
run:
  dir: ${paths.log_dir}/runs/${paths.run_subdir}
sweep:
  dir: ${paths.log_dir}/multiruns/${paths.run_subdir}
  subdir: ${hydra.job.num}
