# @package _global_

# F1 score metric for organism trend predictions conditioned on the base entries,
# grouping by `Hauptgruppe_RoteListen` and `Lebensraum` and scoring only `Antwortvariable` per group.

defaults:
 - override /dataset: organism_trends_forest
 - override /metric: f1_micro

metric:
  fields:
   - organism_trends
  subfield_keys:
    organism_trends:
     - Hauptgruppe_RoteListen
     - Lebensraum
  subfield_values:
    organism_trends:
     - Antwortvariable

  format_as_markdown: true
  sort_fields: true
