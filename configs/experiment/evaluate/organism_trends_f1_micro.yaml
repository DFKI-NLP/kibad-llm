# @package _global_

# F1 score metric for single- or multi-label classification for organism trend predictions.

defaults:
 - override /dataset: organism_trends_forest
 - override /metric: f1_micro

metric:
  # the fields in the prediction and reference to compute the F1 score on
  fields:
   - organism_trends
  # for compound entries, we may ignore certain subfields during evaluation
  ignore_subfields:
    organism_trends: [ "Untergruppe_RoteListen" ]
  format_as_markdown: true
  sort_fields: true
