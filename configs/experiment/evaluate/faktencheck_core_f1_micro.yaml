# @package _global_

# F1 score metric for single- or multi-label classification for multiple fields.
# Compounds are *not* flattened into individual entries.
#
# This config is intended for use with the faktencheck_core_fields_schema, it defines only fields
# from that schema, which is the main difference to the 'faktencheck_f1_micro' config. However,
# in contrast to that we exclude "german_name".

defaults:
 - override /metric: f1_micro

metric:
  # compute metrics on flattened fields, i.e. split compounds
  flatten_dicts: false
  # the fields in the prediction and reference to compute the F1 score on
  fields:
   - habitat
   - biodiversity_level
   - ecosystem_type
   - taxa
  ignore_subfields:
    ecosystem_type: [ "category", "description"]
    taxa: [ "german_name", "collective_term" ]
  format_as_markdown: true
  sort_fields: true
