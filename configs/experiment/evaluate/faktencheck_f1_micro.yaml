# @package _global_

# F1 score metric for single- or multi-label classification for multiple fields.

defaults:
 - override /metric: f1_micro

paths:
  log_dir: ${paths.save_dir}/logs/evaluate

metric:
  # the fields in the prediction and reference to compute the F1 score on
  fields:
   - habitat
   - natural_region
   - climate
   - landuse
   - spatial_extent
   - spatial_resolution
   - spatial_measurements
   - temporal_extent
   - temporal_extent_unit
   - temporal_resolution
   - temporal_measurements
   - start_year
   - end_year
   - method
   - study_type
   - project
   - biodiversity_level
   - biodiversity_variable
   - transformation_potential
   - ecosystem_type
   - location
   - taxa
   - soil
   - conservation_area
   - management_measure
   - impulse_measure
   - direct_driver
   - indirect_driver
   - ecosystem_service
  # for compound entries, we may ignore certain subfields during evaluation
  ignore_subfields:
    ecosystem_type: [ "description" ]
    taxa: [ "collective_term" ]
    conservation_area: [ "description" ]
    direct_driver: [ "details" ]
    indirect_driver: [ "details" ]
    # Note: we do not ignore `description` of `management_measure`/`impulse_measure`
    #  since it holds its main content (and is mandatory)
  format_as_markdown: true
  sort_fields: true
