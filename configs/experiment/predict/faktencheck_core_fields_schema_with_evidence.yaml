# @package _global_

# This experiment config uses the EcosystemStudyFeaturesCoreFields schema, which focuses on
# a core set of highly relevant fields from the Faktencheck literature database. See
# https://github.com/DFKI-NLP/kibad-llm/issues/158
# However, it also enables evidence detection, so that each extracted field value
# is accompanied by a text snippet from the original document that supports the extraction.

# To execute this experiment run:
# uv run -m kibad_llm.predict experiment/predict=faktencheck_core_fields_schema_with_evidence pdf_directory=path/to/pdf/files

defaults:
  #- _with_evidence
  - override /extractor/schema: faktencheck_core
  # We use a polished prompt template with additional instructions for better extraction performance.
  - override /extractor/prompt_template: faktencheck_core_v1_with_evidence_and_persona
