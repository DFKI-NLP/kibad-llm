# @package _global_

# This experiment config shows ensemble extraction using both gpt_oss_20b and qwen3_30b as LLMs.

# To execute this experiment run:
# uv run -m kibad_llm.predict experiment/predict=faktencheck_core_ensemble_gpt_oss_and_qwen3 pdf_directory=path/to/pdf/files

defaults:
  - /extractor/llm@extractor.overrides.1.llm: gpt_oss_20b
  - /extractor/llm@extractor.overrides.2.llm: qwen3_30b
  - override /extractor: ensemble
  # We use a polished prompt template with additional instructions for better extraction performance.
  - override /extractor/prompt_template: faktencheck_core_v1_with_evidence_and_persona

extractor:
  schema:
    # Create the schema from the pydantic model of EcosystemStudyFeaturesCoreFields
    _target_: kibad_llm.schema.types.EcosystemStudyFeaturesCoreFields.model_json_schema
    by_alias: false

  # Enabling this flag will adjust the schema to wrap each field value with evidence detection metadata
  adjust_schema_for_evidence_detection: true

  # Enabling this flag will create the schema description from the adjusted schema.
  # If not enabled, the original schema description will be used. In this case, it is
  # highly recommended to use a prompt template that is aware of evidence detection.
  adjust_schema_description_for_evidence_detection: true

  # In case of enabled adjust_schema_description_for_evidence_detection, customize
  # the evidence anchor description here.
  evidence_anchor_description: "Wörtliches Zitat aus dem Originaltext, das den extrahierten Inhalt belegt."

  # In case of enabled adjust_schema_description_for_evidence_detection, customize
  # the wrapped content description here. If not set, no description will be used.
  # wrapped_content_description: "Der extrahierte Inhalt."

  # Enabling response_has_metadata will cause metadata unwrapping to be performed on the LLM response.
  # This means that the extracted field values will be unwrapped from their evidence detection
  # metadata, so that only the raw field "content" values are returned in the final predictions.
  # If adjust_schema_for_evidence_detection is enabled, this is automatically set to true.
  # Useful when a handcrafted schema with evidence detection metadata is used (and, thus,
  # adjust_schema_for_evidence_detection is false).
  # response_has_metadata: true

  # Customize metadata augmentation ...
  # augment_metadata_kwargs:
  #   # ... such as the margin (in words) around the evidence snippet
  #   evidence_snippet_margin: 15

# To verify the evidence anchors wrt. the original text, we may return the text from the pdf conversion.
# store_text_in_predictions: true

# If we store the whole text, enable compression of the output file by setting a .gz extension
# output_file_name: predictions.jsonl.gz
