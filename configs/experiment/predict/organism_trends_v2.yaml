# @package _global_

# This experiment uses the schema EcosystemStudyOrganismTrends to extract organism based
# ecosystem study trends from Markdown documents.

# To execute this experiment run:
# python -m kibad_llm.predict experiment=organism_trends

defaults:
  - override /extractor: simple
  - override /extractor/prompt_template: organism_trends_v2

extractor:
  schema:
    # create the schema from the pydantic model EcosystemStudyOrganismTrends
    _target_: kibad_llm.schema.types.EcosystemStudyOrganismTrendsV2.model_json_schema
    by_alias: false
