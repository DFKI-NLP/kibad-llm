# @package _global_

# This experiment uses two schemata to extract data for all fields in the Fragenkatalog database:
#   - EcosystemStudyFeaturesWithoutCompounds: fields without compounds, and
#   - EcosystemStudyFeaturesCompoundsOnly: compound fields only.

# To execute this experiment run:
# python -m kibad_llm.predict experiment=two_schemata

defaults:
  # use two override setups (setup_a and setup_b) to extract with two different schemas separately
  - /extractor/schema@extractor.overrides.setup_a.schema: faktencheck_without_compounds
  - /extractor/schema@extractor.overrides.setup_b.schema: faktencheck_compounds_only
  - override /extractor: union
