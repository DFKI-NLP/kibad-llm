hydra:
  run:
    dir: ${paths.log_dir}/runs/${paths.run_subdir}
  sweep:
    dir: ${paths.log_dir}/multiruns/${paths.run_subdir}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(purple)sHYDRA%(reset)s] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(blue)s%(name)s%(reset)s][%(log_color)s%(levelname)s%(reset)s]
          - %(message)s'
        log_colors:
          DEBUG: purple
          INFO: green
          WARNING: yellow
          ERROR: red
          CRITICAL: red
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks:
    save_job_return:
      _target_: kibad_llm.hydra_callbacks.SaveJobReturnValueCallback
      integrate_multirun_result: false
      multirun_convert_job_ids: true
      multirun_add_overrides_as_dict: true
      sort_markdown_columns: true
      filenames:
      - job_return_value.json
      - job_return_value.md
      multirun_show_file_contents:
      - job_return_value.md
      multirun_overrides_separator: '#'
      multirun_replace_existing_overrides: true
      multirun_aggregator_blacklist:
      - min
      - 25%
      - 50%
      - 75%
      - max
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - name=260_baseline_default_no_evi
    - experiment/predict=faktencheck_core_fields_schema
    - pdf_directory=/ds/text/kiba-d/dev-set-100
    - extractor/llm=gpt_oss_20b_in_process,gemma3_27b_in_process,gpt_5
    - seed=42
    - extractor/prompt_template=default
    - +extractor.adjust_schema_for_evidence_detection=false
  job:
    name: predict
    chdir: null
    override_dirname: +extractor.adjust_schema_for_evidence_detection=false,experiment/predict=faktencheck_core_fields_schema,extractor/llm=gpt_oss_20b_in_process,gemma3_27b_in_process,gpt_5,extractor/prompt_template=default,name=260_baseline_default_no_evi,pdf_directory=/ds/text/kiba-d/dev-set-100,seed=42
    id: ???
    num: ???
    config_name: predict.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /netscratch/hennig/code/kibad-llm
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /netscratch/hennig/code/kibad-llm/configs
      schema: file
      provider: main
    - path: hydra_plugins.hydra_colorlog.conf
      schema: pkg
      provider: hydra-colorlog
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      experiment/predict: faktencheck_core_fields_schema
      extractor: simple
      extractor/request_parameters: default
      extractor/prompt_template: default
      extractor/llm: gpt_oss_20b
      pdf_reader: pymupdf4llm
      hydra: default
      paths: predict
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: colorlog
      hydra/hydra_logging: colorlog
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
print_config: true
name: 260_baseline_default_no_evi
seed: 42
pdf_directory: /ds/text/kiba-d/dev-set-100
output_dir: ${paths.prediction_save_dir}
fast_dev_run: false
extraction_caching: false
store_text_in_predictions: false
pdf_reader_num_proc: null
extractor_num_proc: null
paths:
  root_dir: ${oc.env:PROJECT_ROOT}
  data_dir: ${paths.root_dir}/data
  timestamp: ${now:%Y-%m-%d_%H-%M-%S}
  run_subdir: ${paths.timestamp}
  output_dir: ${hydra:runtime.output_dir}
  save_dir: ${paths.root_dir}
  log_dir: ${paths.save_dir}/logs/${name}/predict
  work_dir: ${hydra:runtime.cwd}
  prediction_save_dir: ${paths.save_dir}/predictions/${name}/${paths.timestamp}
pdf_reader:
  _target_: kibad_llm.preprocessing.read_pdf_as_markdown_via_pymupdf4llm
  _partial_: true
extractor:
  llm:
    _target_: kibad_llm.llms.OpenAILikeVllm
    api_base: ${oc.env:LLM_API_BASE,http://127.0.0.1:5001/v1}
    api_key: dummy
    model: openai/gpt-oss-20b
    temperature: 0.0
    context_window: 131072
    timeout: 360
    max_retries: 3
    is_chat_model: true
    additional_kwargs:
      max_completion_tokens: 8192
      seed: ${seed}
  prompt_template:
    system_message: 'Du extrahierst Informationen aus einem Markdown-Dokument.

      Gib **ausschließlich** gültiges JSON nach dem folgendem Schema zurück.

      Keine zusätzlichen Felder, keine Erklärungen.

      {schema_description}

      '
    user_message: 'Dokument in Markdown Format:


      {document}

      '
    schema_description_placeholder: schema_description
    document_placeholder: document
  request_parameters: {}
  _target_: kibad_llm.extractors.extract_from_text_lenient
  _partial_: true
  schema:
    _target_: kibad_llm.schema.types.EcosystemStudyFeaturesCoreFields.model_json_schema
    by_alias: false
  return_reasoning: false
  return_messages: false
  return_messages_formatted: false
  adjust_schema_for_evidence_detection: false
