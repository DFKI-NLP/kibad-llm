name: 397_faktencheck_core_v1_for_chunking
prediction_logs:
- logs/397_faktencheck_core_v1_for_chunking/predict/
- logs/380_faktencheck_core/predict/
paths:
  root_dir: ${oc.env:PROJECT_ROOT}
  data_dir: ${paths.root_dir}/data
  timestamp: ${now:%Y-%m-%d_%H-%M-%S}
  run_subdir: ${paths.timestamp}
  output_dir: ${hydra:runtime.output_dir}
  save_dir: ${paths.root_dir}
  log_dir: ${paths.save_dir}/logs/${name}/evaluate
  work_dir: ${hydra:runtime.cwd}
  prediction_save_dir: ${paths.save_dir}/predictions/${name}/${paths.timestamp}
dataset:
  predictions:
    _target_: kibad_llm.dataset.prediction.load_with_metadata
    log: logs/397_faktencheck_core_v1_for_chunking/predict/multiruns/2026-03-30_16-28-26/5
    file: null
    id_key: file_name
    process_id:
      _partial_: true
      _target_: kibad_llm.utils.path.strip_filename_extension
    preprocess:
      _target_: kibad_llm.utils.dictionary.get
      _partial_: true
      key: structured
    skip_by_id:
    - 2E9XWUUE
    - 2EUNPHDZ
    - 2P53UVJA
    - 2RXMDX8I
    - 3LGPK6BL
    - 3WEEGFGW
    - 46RX4AEN
    - 4YXRYRJC
    - 4Z67G9T5
    - 5SIYLM9W
    - 6D23L7B5
    - 6G2THNDX
    - 7DSY6RMR
    - 84QQ9F5S
    - 885FDL5Z
  references:
    _target_: kibad_llm.dataset.json.read_and_preprocess
    file: ../interim/faktencheck-db/faktenscheck_core_corrected.jsonl
    id_key: zotitem_ptr_id
  _target_: kibad_llm.dataset.utils.merge_references_into_predictions
metric:
  _target_: kibad_llm.metrics.F1MicroMultipleFieldsMetric
  fields:
  - habitat
  - biodiversity_level
  - ecosystem_type.term
  - ecosystem_type.category
  - taxa.species_group
  format_as_markdown: true
  sort_fields: true
  flatten_dicts: true
