hydra:
  run:
    dir: ${paths.log_dir}/runs/${paths.run_subdir}
  sweep:
    dir: ${paths.log_dir}/multiruns/${paths.run_subdir}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      dataset.predictions.log: ${get_directories_with_file:${prediction_logs},job_return_value.json,True}
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(purple)sHYDRA%(reset)s] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(blue)s%(name)s%(reset)s][%(log_color)s%(levelname)s%(reset)s]
          - %(message)s'
        log_colors:
          DEBUG: purple
          INFO: green
          WARNING: yellow
          ERROR: red
          CRITICAL: red
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks:
    save_job_return:
      handle_previous_result: prediction
      _target_: kibad_llm.hydra_callbacks.SaveJobReturnValueCallback
      replace_existing_overrides: false
      sort_markdown_columns: true
      filenames:
      - job_return_value.json
      - job_return_value.md
      integrate_multirun_result: false
      multirun_add_overrides_as_dict: true
      multirun_convert_job_ids: true
      multirun_show_file_contents: null
      multirun_overrides_separator: '#'
      multirun_aggregator_blacklist:
      - min
      - 25%
      - 50%
      - 75%
      - max
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.callbacks.save_job_return.multirun_show_file_contents=null
    task:
    - dataset.predictions.log=logs/397_faktencheck_core_v1_for_chunking/predict/multiruns/2026-04-02_16-54-15/0
    - name=397_faktencheck_core_v1_for_chunking
    - experiment/evaluate=faktencheck_core_f1_micro_flat
    - dataset.references.file=../interim/faktencheck-db/faktenscheck_core_corrected.jsonl
    - metric.fields=[habitat,biodiversity_level,ecosystem_type.term,ecosystem_type.category,taxa.species_group]
    - prediction_logs=[logs/397_faktencheck_core_v1_for_chunking/predict/,logs/380_faktencheck_core/predict/]
    - +dataset.predictions.skip_by_id=[2E9XWUUE,2EUNPHDZ,2P53UVJA,2RXMDX8I,3LGPK6BL,3WEEGFGW,46RX4AEN,4YXRYRJC,4Z67G9T5,5SIYLM9W,6D23L7B5,6G2THNDX,7DSY6RMR,84QQ9F5S,885FDL5Z]
  job:
    name: evaluate
    chdir: null
    override_dirname: +dataset.predictions.skip_by_id=[2E9XWUUE,2EUNPHDZ,2P53UVJA,2RXMDX8I,3LGPK6BL,3WEEGFGW,46RX4AEN,4YXRYRJC,4Z67G9T5,5SIYLM9W,6D23L7B5,6G2THNDX,7DSY6RMR,84QQ9F5S,885FDL5Z],dataset.predictions.log=logs/397_faktencheck_core_v1_for_chunking/predict/multiruns/2026-04-02_16-54-15/0,dataset.references.file=../interim/faktencheck-db/faktenscheck_core_corrected.jsonl,experiment/evaluate=faktencheck_core_f1_micro_flat,metric.fields=[habitat,biodiversity_level,ecosystem_type.term,ecosystem_type.category,taxa.species_group],name=397_faktencheck_core_v1_for_chunking,prediction_logs=[logs/397_faktencheck_core_v1_for_chunking/predict/,logs/380_faktencheck_core/predict/]
    id: '23'
    num: 23
    config_name: evaluate.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/hugo/programming/kiba/kiba/data/prediction_results
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/hugo/programming/kiba/kiba/configs
      schema: file
      provider: main
    - path: hydra_plugins.hydra_colorlog.conf
      schema: pkg
      provider: hydra-colorlog
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/hugo/programming/kiba/kiba/logs/397_faktencheck_core_v1_for_chunking/evaluate/multiruns/2026-04-10_16-12-49/23
    choices:
      experiment/evaluate: faktencheck_core_f1_micro_flat
      metric: f1_micro
      dataset: faktencheck
      dataset/references: faktencheck_db_converted
      dataset/predictions: extraction_result
      hydra: default
      paths: evaluate
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: colorlog
      hydra/hydra_logging: colorlog
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
