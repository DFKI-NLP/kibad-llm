hydra:
  run:
    dir: ${paths.log_dir}/runs/${paths.run_subdir}
  sweep:
    dir: ${paths.log_dir}/multiruns/${paths.run_subdir}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      dataset.predictions.log: ${get_directories_with_file:${prediction_logs},job_return_value.json,True}
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(purple)sHYDRA%(reset)s] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(blue)s%(name)s%(reset)s][%(log_color)s%(levelname)s%(reset)s]
          - %(message)s'
        log_colors:
          DEBUG: purple
          INFO: green
          WARNING: yellow
          ERROR: red
          CRITICAL: red
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks:
    save_job_return:
      _target_: kibad_llm.hydra_callbacks.SaveJobReturnValueCallback
      integrate_multirun_result: false
      multirun_convert_job_ids: true
      multirun_add_overrides_as_dict: true
      sort_markdown_columns: true
      filenames:
      - job_return_value.json
      - job_return_value.md
      multirun_show_file_contents:
      - job_return_value.md
      multirun_overrides_separator: '#'
      multirun_replace_existing_overrides: true
      multirun_aggregator_blacklist:
      - min
      - 25%
      - 50%
      - 75%
      - max
      multirun_markdown_group_by: overrides.extractor/llm
  output_subdir: .hydra
  overrides:
    hydra:
    - +hydra.callbacks.save_job_return.multirun_markdown_group_by=overrides.extractor/llm
    task:
    - name=261_baseline_faktencheck_core_variance
    - experiment/evaluate=prediction_errors
    - prediction_logs=logs/261_baseline_faktencheck_core_variance/predict/multiruns/2026-01-14_20-01-33
  job:
    name: evaluate
    chdir: null
    override_dirname: experiment/evaluate=prediction_errors,name=261_baseline_faktencheck_core_variance,prediction_logs=logs/261_baseline_faktencheck_core_variance/predict/multiruns/2026-01-14_20-01-33
    id: ???
    num: ???
    config_name: evaluate.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /netscratch/binder/projects/kibad-llm
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /netscratch/binder/projects/kibad-llm/configs
      schema: file
      provider: main
    - path: hydra_plugins.hydra_colorlog.conf
      schema: pkg
      provider: hydra-colorlog
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      experiment/evaluate: prediction_errors
      metric: prediction_errors
      dataset: predictions_only
      dataset/predictions: extraction_result
      hydra: default
      paths: evaluate
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: colorlog
      hydra/hydra_logging: colorlog
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
name: 261_baseline_faktencheck_core_variance
prediction_logs: logs/261_baseline_faktencheck_core_variance/predict/multiruns/2026-01-14_20-01-33
paths:
  root_dir: ${oc.env:PROJECT_ROOT}
  data_dir: ${paths.root_dir}/data
  timestamp: ${now:%Y-%m-%d_%H-%M-%S}
  run_subdir: ${paths.timestamp}
  output_dir: ${hydra:runtime.output_dir}
  save_dir: ${paths.root_dir}
  log_dir: ${paths.save_dir}/logs/${name}/evaluate
  work_dir: ${hydra:runtime.cwd}
  prediction_save_dir: ${paths.save_dir}/predictions/${name}/${paths.timestamp}
dataset:
  predictions:
    _target_: kibad_llm.dataset.prediction.load_with_metadata
    log: null
    file: null
    id_key: file_name
    process_id:
      _partial_: true
      _target_: kibad_llm.utils.path.strip_filename_extension
    preprocess: null
  _target_: kibad_llm.dataset.utils.merge_references_into_predictions
  references: {}
  allow_missing_references: true
metric:
  _target_: kibad_llm.metrics.ErrorCollector
  type_separator: ': '
  show_errors: true
